<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MIMIC — authorized email simulation and awareness exercises.">
    <title>{% block PAGENAME %}{% endblock %} | MIMIC</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/pure-min.css" integrity="sha384-X38yfunGUhNzHpBaEBsWLO+A0HDYOQi8ufWDkZ0k9e0eXz/tH3II7uKZ9msv++Ls" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body class="{% block BODY_CLASS %}{% endblock %}">
<div id="layout">
    <a href="#menu" id="menuLink" class="menu-link" aria-label="Open menu">
        <span></span>
    </a>

    <div id="menu">
        <div class="pure-menu">
            <a class="pure-menu-heading" href="{{ url_for('index') }}">MIMIC</a>

            <ul class="pure-menu-list">
                {% set ep = request.endpoint %}
                <li class="pure-menu-item{% if ep == 'index' %} pure-menu-selected{% endif %}">
                    <a href="{{ url_for('index') }}" class="pure-menu-link">home</a>
                </li>
                <li class="pure-menu-item{% if ep in ('clusters_list', 'cluster_detail') %} pure-menu-selected{% endif %}">
                    <a href="{{ url_for('clusters_list') }}" class="pure-menu-link">clusters</a>
                </li>
                <li class="pure-menu-item{% if ep in ('campaigns', 'campaign_detail') %} pure-menu-selected{% endif %}">
                    <a href="{{ url_for('campaigns') }}" class="pure-menu-link">campaigns</a>
                </li>
                <li class="pure-menu-item{% if ep in ('mail_templates', 'mail_template_edit') %} pure-menu-selected{% endif %}">
                    <a href="{{ url_for('mail_templates') }}" class="pure-menu-link">mail templates</a>
                </li>
                <li class="pure-menu-item{% if ep in ('senders', 'sender_edit') %} pure-menu-selected{% endif %}">
                    <a href="{{ url_for('senders') }}" class="pure-menu-link">senders</a>
                </li>
                <li class="pure-menu-item{% if ep == 'help' %} pure-menu-selected{% endif %}">
                    <a href="{{ url_for('help') }}" class="pure-menu-link">help</a>
                </li>
                <li class="pure-menu-item menu-item-divided{% if ep == 'settings' %} pure-menu-selected{% endif %}">
                    <a href="{{ url_for('settings') }}" class="pure-menu-link">settings</a>
                </li>
            </ul>
        </div>
    </div>

    <div id="main">
        <div class="header">
            {% block HEADER %}
            <h1>MIMIC</h1>
            <h2>Welcome</h2>
            {% endblock %}
        </div>

        <div class="content">
            <div class="content-inner">
                {% include '_flash.html' %}
                {% block CONTENT %}
                <p class="lead">Select a section from the sidebar.</p>
                {% endblock %}
            </div>
        </div>
    </div>
</div>
<script>
(function () {
    var layout = document.getElementById('layout');
    var link = document.getElementById('menuLink');
    if (!layout || !link) return;
    link.addEventListener('click', function (e) {
        e.preventDefault();
        e.stopPropagation();
        layout.classList.toggle('active');
    });
})();
</script>
</body>
</html>
