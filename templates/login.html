{% extends 'base.html' %}

{% block BODY_CLASS %}layout-auth{% endblock %}

{% block PAGENAME %}Login{% endblock %}

{% block HEADER %}
<h1>Sign in</h1>
<h2>MIMIC</h2>
{% endblock %}

{% block CONTENT %}
<p class="lead">Enter your credentials to continue.</p>

<form action="{{ url_for('login') }}" method="post" autocomplete="off" class="pure-form pure-form-stacked">
  <label for="username">Username</label>
  <input type="text" name="username" id="username" required autocomplete="username">

  <label for="password">Password</label>
  <input type="password" name="password" id="password" required autocomplete="current-password">

  <p style="margin-top:1rem">
    <button type="submit" class="pure-button pure-button-primary">Sign in</button>
  </p>
</form>
{% endblock %}
