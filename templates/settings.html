{% extends 'base.html' %}

{% block PAGENAME %}Settings{% endblock%}

{% block HEADER %}
<h1>Settings</h1>
<h2>Manage MIMIC settings</h2>
{% endblock%}

{% block CONTENT %}
<form action="{{ url_for('settings') }}" method="post" autocomplete="off" class="pure-form pure-form-stacked">
  <fieldset>
    <legend><h3>Mail server configuration</h3></legend>

    <div>
      <label for="mail_server">Mail server</label><br>
      <input type="text" id="mail_server" name="mail_server" value="{{ current.mail_server if current else '' }}" placeholder="smtp.example.com">
      <label><input type="checkbox" name="clear_mail_server"> clear</label>
    </div>

    <div>
      <label for="mail_port">Mail port</label><br>
      <input type="number" id="mail_port" name="mail_port" value="{{ current.mail_port if current else '' }}" placeholder="587" min="1" max="65535">
      <label><input type="checkbox" name="clear_mail_port"> clear</label>
    </div>

    <div>
      <label for="mail_username">Mail username</label><br>
      <input type="text" id="mail_username" name="mail_username" value="{{ current.mail_username if current else '' }}" placeholder="user@example.com">
      <label><input type="checkbox" name="clear_mail_username"> clear</label>
    </div>

    <div>
      <label for="mail_password">Mail password</label><br>
      <input type="password" id="mail_password" name="mail_password" value="{{ current.mail_password if current else '' }}">
      <label><input type="checkbox" name="clear_mail_password"> clear</label>
    </div>
  </fieldset>

  <fieldset>
    <legend><h3>Campaign configuration</h3></legend>

    <div>
      <label for="send_delay_seconds">Mail sending delay (seconds)</label><br>
      <input type="number" id="send_delay_seconds" name="send_delay_seconds" value="{{ current.send_delay_seconds if current else '' }}" placeholder="0" min="0">
      <label><input type="checkbox" name="clear_send_delay_seconds"> clear</label>
    </div>
  </fieldset>

  <p style="margin-top:1rem">
    <button type="submit" class="pure-button pure-button-primary">Save settings</button>
  </p>
</form>
{% endblock %}
